<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Careers at Celestique Spa — authentic Vietnamese spa in Osaka. Now hiring therapists and reception staff.">
  <title>Careers — Celestique Spa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@500;600&family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --ink:#241a12; --ink-soft:#6b5949; --brand:#8B4513; --brand-deep:#6d3410;
      --gold:#c19a6b; --gold-pale:#e9dcc8; --cream:#faf6f0; --white:#fff;
      --font-display:"Cormorant Garamond","Noto Serif JP","Noto Serif SC",serif;
      --font-body:"Noto Sans JP","Noto Sans SC",sans-serif;
    }
    html[lang="zh-CN"] { --font-body:"Noto Sans SC","Noto Sans JP",sans-serif; --font-display:"Cormorant Garamond","Noto Serif SC",serif; }
    html[lang="ja"]    { --font-body:"Noto Sans JP","Noto Sans SC",sans-serif; }
    body {
      font-family:var(--font-body); font-weight:300; color:var(--ink); min-height:100vh; padding:40px 20px;
      background:radial-gradient(circle at 15% 10%, rgba(193,154,107,.13), transparent 40%),
                 radial-gradient(circle at 88% 90%, rgba(139,69,19,.09), transparent 45%), var(--cream);
      -webkit-font-smoothing:antialiased;
    }
    .wrap { max-width:760px; margin:0 auto; animation:fade .8s ease-out; }
    @keyframes fade { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    .top { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:2.4rem; }
    .back { display:inline-flex; align-items:center; gap:8px; color:var(--ink-soft); text-decoration:none; font-size:.9rem; letter-spacing:.04em; transition:color .3s; }
    .back:hover { color:var(--brand); }
    .langs { display:flex; gap:.2rem; flex-shrink:0; }
    .langs button { font-size:.7rem; letter-spacing:.08em; color:var(--ink-soft); padding:.35rem .55rem; border:none; background:transparent; cursor:pointer; font-family:inherit; transition:color .3s; }
    .langs button:hover { color:var(--brand); }
    .langs button.active { color:var(--brand); border-bottom:1px solid var(--gold); }
    .head { text-align:center; margin-bottom:2.6rem; }
    .badge { display:inline-block; border:1px solid var(--gold); padding:7px 18px; margin-bottom:1.1rem; font-size:.66rem; color:var(--brand); font-weight:500; letter-spacing:.3em; text-transform:uppercase; }
    .head h1 { font-family:var(--font-display); font-size:clamp(2rem,5vw,2.8rem); font-weight:600; letter-spacing:.05em; margin-bottom:.7rem; }
    .rule { width:56px; height:2px; background:var(--gold); margin:0 auto 1.1rem; }
    .head p { font-size:.98rem; color:var(--ink-soft); line-height:1.8; max-width:560px; margin:0 auto; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2.6rem; }
    .card { background:var(--white); border:1px solid var(--gold-pale); padding:2rem 1.9rem; }
    .card h3 { font-family:var(--font-display); font-size:1.55rem; font-weight:600; color:var(--ink); margin-bottom:.7rem; }
    .card > p { color:var(--ink-soft); font-size:.92rem; line-height:1.75; margin-bottom:1.1rem; }
    .card ul { list-style:none; }
    .card li { font-size:.88rem; color:var(--ink); padding:.55rem 0; border-top:1px solid var(--gold-pale); }
    .card li:first-child { border-top:none; }
    .card li::before { content:"—"; color:var(--gold); margin-right:.5rem; }
    .contact { text-align:center; }
    .contact > p { color:var(--ink-soft); font-size:.95rem; margin-bottom:1.3rem; }
    .cta { display:flex; flex-wrap:wrap; justify-content:center; gap:.8rem; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:.95rem 2.2rem; font-family:var(--font-body); font-size:.8rem; font-weight:500; letter-spacing:.12em; text-decoration:none; border:1px solid transparent; cursor:pointer; transition:all .3s; }
    .btn svg { width:18px; height:18px; }
    .btn-dark { background:var(--brand); color:var(--cream); border-color:var(--brand); }
    .btn-dark:hover { background:var(--brand-deep); border-color:var(--brand-deep); transform:translateY(-2px); }
    .btn-gold { background:transparent; color:var(--brand); border-color:var(--gold); }
    .btn-gold:hover { background:var(--gold); color:var(--white); transform:translateY(-2px); }
    .foot { text-align:center; margin-top:3rem; font-size:.78rem; color:var(--ink-soft); }
    .foot a { color:var(--brand); text-decoration:none; }
    @media (max-width:640px){ body{padding:24px 15px;} .grid{grid-template-columns:1fr;} .top{flex-wrap:wrap;} .cta{flex-direction:column;align-items:stretch;width:min(320px,100%);margin:0 auto;} .btn{width:100%;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="landing.html" class="back" id="backLink">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="backText">Back to Home</span>
      </a>
      <div class="langs" role="group" aria-label="Language">
        <button type="button" data-lang="cn">中文</button>
        <button type="button" data-lang="en" class="active">EN</button>
        <button type="button" data-lang="jp">日本語</button>
      </div>
    </div>

    <div class="head">
      <div class="badge" id="badge">Recruit</div>
      <h1 id="title">Careers</h1>
      <div class="rule"></div>
      <p id="lead"></p>
    </div>

    <div class="grid">
      <article class="card">
        <h3 id="j1t"></h3>
        <p id="j1d"></p>
        <ul id="j1p"></ul>
      </article>
      <article class="card">
        <h3 id="j2t"></h3>
        <p id="j2d"></p>
        <ul id="j2p"></ul>
      </article>
    </div>

    <div class="contact">
      <p id="cta"></p>
      <div class="cta">
        <a href="tel:+81649632477" class="btn btn-dark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          +81 6-4963-2477
        </a>
        <a href="mailto:celestiquespa@gmail.com?subject=Recruit" class="btn btn-gold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7.5l8.5 6 8.5-6"/></svg>
          <span id="emailBtn">Apply by Email</span>
        </a>
      </div>
    </div>

    <div class="foot" id="foot"></div>
  </div>

  <script>
    var i18n = {
      en: { htmlLang:'en', title:'Careers — Celestique Spa', back:'Back to Home', badge:'Recruit', h:'Careers',
        lead:"We're opening our second branch in Shinsaibashi and looking for new members to join us in creating Kansai's only Vietnamese spa experience.",
        j1t:'Therapist (Massage)', j1d:'Vietnamese-style massage & Royal Head Spa. No experience necessary — paid training provided.', j1p:['¥1,300+/hr + commission','Full-time or part-time','Full transport covered'],
        j2t:'Reception & Cashier', j2d:'Bookings, reception and checkout. Chinese / English speakers welcome.', j2p:['¥1,200+/hr','Shift-based','Full transport covered'],
        cta:'To apply or ask us anything, get in touch below.', email:'Apply by Email',
        foot:'&copy; 2026 Celestique Spa. All rights reserved. &nbsp;·&nbsp; Powered by <a href="https://reserveinjp.com/" target="_blank" rel="noopener">reserveinjp</a>' },
      jp: { htmlLang:'ja', title:'採用情報 — Celestique Spa', back:'ホームに戻る', badge:'採用', h:'採用情報',
        lead:'心斎橋2号店のオープンに向けて、一緒に働く仲間を募集しています。関西唯一のベトナム式SPAを、私たちと一緒に。',
        j1t:'セラピスト（マッサージ）', j1d:'ベトナム式マッサージ・帝王ヘッドスパの施術。未経験可、研修あり。', j1p:['時給 ¥1,300〜＋歩合','正社員・アルバイト可','交通費全額支給'],
        j2t:'受付・レジスタッフ', j2d:'ご予約対応・受付・会計。中国語／英語が話せる方歓迎。', j2p:['時給 ¥1,200〜','シフト制','交通費全額支給'],
        cta:'ご応募・お問い合わせはお気軽にご連絡ください。', email:'メールで応募',
        foot:'&copy; 2026 Celestique Spa. All rights reserved. &nbsp;·&nbsp; Powered by <a href="https://reserveinjp.com/" target="_blank" rel="noopener">reserveinjp</a>' },
      cn: { htmlLang:'zh-CN', title:'招聘信息 — Celestique Spa', back:'返回首页', badge:'诚聘', h:'招聘信息',
        lead:'心斋桥2号店即将开业，诚邀伙伴加入，一起打造关西唯一的越南式SPA体验。',
        j1t:'按摩技师（セラピスト）', j1d:'越南式按摩・帝王头部SPA施术。经验不限，提供带薪培训。', j1p:['时薪 ¥1,300〜 + 提成','正职・兼职均可','交通费全额支给'],
        j2t:'前台・收银', j2d:'预约接待、前台与收银。会中文 / 英文者优先。', j2p:['时薪 ¥1,200〜','轮班制','交通费全额支给'],
        cta:'欢迎应聘或咨询，请通过以下方式联系我们。', email:'邮件应聘',
        foot:'&copy; 2026 Celestique Spa. 版权所有。 &nbsp;·&nbsp; Powered by <a href="https://reserveinjp.com/" target="_blank" rel="noopener">reserveinjp</a>' },
    };
    function getLang(){
      var p=new URLSearchParams(location.search).get('lang');
      if(p==='cn'||p==='jp'||p==='en') return p;
      var r=document.referrer;
      if(r.indexOf('/cn/')!==-1) return 'cn';
      if(r.indexOf('/jp/')!==-1) return 'jp';
      if(r.indexOf('/en/')!==-1) return 'en';
      return 'en';
    }
    function apply(lang){
      var o=i18n[lang];
      document.documentElement.lang=o.htmlLang; document.title=o.title;
      document.getElementById('backText').textContent=o.back;
      document.getElementById('badge').textContent=o.badge;
      document.getElementById('title').textContent=o.h;
      document.getElementById('lead').textContent=o.lead;
      document.getElementById('j1t').textContent=o.j1t;
      document.getElementById('j1d').textContent=o.j1d;
      document.getElementById('j2t').textContent=o.j2t;
      document.getElementById('j2d').textContent=o.j2d;
      document.getElementById('j1p').innerHTML=o.j1p.map(function(x){return '<li>'+x+'</li>';}).join('');
      document.getElementById('j2p').innerHTML=o.j2p.map(function(x){return '<li>'+x+'</li>';}).join('');
      document.getElementById('cta').textContent=o.cta;
      document.getElementById('emailBtn').textContent=o.email;
      document.getElementById('foot').innerHTML=o.foot;
      document.querySelectorAll('.langs button').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-lang')===lang); });
      var u=new URL(location.href); u.searchParams.set('lang',lang); history.replaceState(null,'',u);
    }
    apply(getLang());
    document.querySelectorAll('.langs button').forEach(function(b){ b.addEventListener('click', function(){ apply(this.getAttribute('data-lang')); }); });
  </script>
</body>
</html>
